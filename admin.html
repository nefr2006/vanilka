<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — Ванилька</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-gem">✦</span>
      <span class="logo-name">Ванилька</span>
    </div>
    <h2>Вход в панель</h2>
    <p class="login-sub">Введите данные для доступа к управлению</p>
    <form id="loginForm">
      <div class="field">
        <label>Логин</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="username" value="admin" placeholder="admin">
        </div>
      </div>
      <div class="field">
        <label>Пароль</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Введите пароль" required>
        </div>
      </div>
      <div class="login-error" id="loginError" style="display:none">
        <i class="fas fa-exclamation-circle"></i> Неверный логин или пароль
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Войти</button>
    </form>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-layout" id="adminPanel" style="display:none">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-gem">✦</span>
      <span class="logo-name">Ванилька</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="orders">
        <i class="fas fa-shopping-bag"></i> Заказы
        <span class="nav-badge" id="navBadge" style="display:none">0</span>
      </button>
      <button class="nav-item" data-tab="customers">
        <i class="fas fa-users"></i> Клиенты
      </button>
    </nav>
    <div class="sidebar-footer">
      <a href="index.html" target="_blank" class="sidebar-link">
        <i class="fas fa-external-link-alt"></i> Открыть сайт
      </a>
      <button class="sidebar-link logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Выйти
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">
    <!-- TOPBAR -->
    <div class="topbar">
      <button class="burger-admin" id="burgerAdmin"><i class="fas fa-bars"></i></button>
      <h1 class="page-title" id="pageTitle">Заказы</h1>
      <div class="topbar-right">
        <button class="icon-btn" id="refreshBtn" title="Обновить"><i class="fas fa-sync-alt"></i></button>
        <div class="admin-user"><i class="fas fa-user-circle"></i> <span id="adminUsername">admin</span></div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon" style="background:#e8f4fc;color:#3498db"><i class="fas fa-shopping-bag"></i></div>
        <div class="stat-info"><div class="stat-val" id="statTotal">—</div><div class="stat-label">Всего заказов</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fef0e8;color:#c8783a"><i class="fas fa-clock"></i></div>
        <div class="stat-info"><div class="stat-val" id="statNew">—</div><div class="stat-label">Новых</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#e8f6e8;color:#27ae60"><i class="fas fa-users"></i></div>
        <div class="stat-info"><div class="stat-val" id="statCustomers">—</div><div class="stat-label">Клиентов</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fef9e7;color:#f39c12"><i class="fas fa-ruble-sign"></i></div>
        <div class="stat-info"><div class="stat-val" id="statRevenue">—</div><div class="stat-label">Выручка</div></div>
      </div>
    </div>

    <!-- ORDERS TAB -->
    <div class="tab-pane active" id="tab-orders">
      <div class="table-toolbar">
        <div class="filter-chips">
          <button class="chip active" data-status="all">Все</button>
          <button class="chip" data-status="new">Новые</button>
          <button class="chip" data-status="processing">В работе</button>
          <button class="chip" data-status="completed">Завершены</button>
          <button class="chip" data-status="cancelled">Отменены</button>
        </div>
        <div class="toolbar-right">
          <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" id="searchOrders" placeholder="Поиск...">
          </div>
          <button class="btn-export" id="exportBtn"><i class="fas fa-download"></i> CSV</button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Номер</th>
              <th>Клиент</th>
              <th>Дата</th>
              <th>Сумма</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="6" class="table-empty"><i class="fas fa-spinner fa-spin"></i> Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- CUSTOMERS TAB -->
    <div class="tab-pane" id="tab-customers">
      <div class="table-toolbar">
        <div class="search-wrap">
          <i class="fas fa-search"></i>
          <input type="text" id="searchCustomers" placeholder="Поиск по клиентам...">
        </div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Имя</th>
              <th>Телефон</th>
              <th>Email</th>
              <th>Заказов</th>
              <th>Потрачено</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="customersBody">
            <tr><td colspan="7" class="table-empty"><i class="fas fa-spinner fa-spin"></i> Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- ORDER MODAL -->
<div class="modal-overlay" id="orderModal" style="display:none">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalOrderTitle">Заказ</h3>
      <button class="modal-close" id="closeOrderModal"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="orderModalBody"></div>
  </div>
</div>

<!-- CUSTOMER MODAL -->
<div class="modal-overlay" id="customerModal" style="display:none">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalCustomerTitle">Клиент</h3>
      <button class="modal-close" id="closeCustomerModal"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="customerModalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="a-toast" id="adminToast"></div>

<script src="admin.js"></script>
</body>
</html>
